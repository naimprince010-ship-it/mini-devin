name: plodder
region: blr

services:
  - name: backend
    github:
      repo: your-org/plodder
      branch: main
      deploy_on_push: true
    source_dir: /
    dockerfile_path: Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /api/health
      initial_delay_seconds: 60
      period_seconds: 30
    routes:
      - path: /
    envs:
      - key: OPENAI_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: "REPLACE_WITH_YOUR_KEY"
      - key: OPENAI_ENABLED
        scope: RUN_TIME
        value: "false"
      - key: LLM_MODEL
        scope: RUN_TIME
        value: ollama/llama3
      - key: OLLAMA_ENABLED
        scope: RUN_TIME
        value: "true"
      - key: OLLAMA_API_BASE
        scope: RUN_TIME
        value: http://68.183.92.70:11434
      - key: PORT
        scope: RUN_TIME
        value: "8000"
      - key: DATABASE_URL
        scope: RUN_TIME
        value: "sqlite:///./plodder.db"
      - key: GIT_PYTHON_REFRESH
        scope: RUN_TIME
        value: "quiet"
      - key: PYTHONIOENCODING
        scope: RUN_TIME
        value: "UTF-8"
      - key: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
        scope: RUN_TIME
        value: "1"
      - key: BROWSERLESS_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: ""
      - key: BROWSERLESS_WS_URL
        scope: RUN_TIME
        value: ""
