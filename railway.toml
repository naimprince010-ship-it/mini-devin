# Mini-Devin on Railway — Docker image (Python + Node build inside Dockerfile).
# Service → Variables: see .env.example section "Railway (Variables tab)".
# SQLite is ephemeral unless you add Postgres and set DATABASE_URL.
#
# PORT: Railway injects PORT — do NOT add another PORT in Variables (duplicate / multiline → 502).
# Public Networking target port must equal the resolved listen port (see bootstrap deploy logs).
#
# If the public URL returns 502 but deploy logs show 200 from 10.x.x.x: the edge cannot reach
# your process — enable Public Networking and set the domain's Target port = PORT (often 8080).
# HTTP Logs 502 on / while Deploy Logs show /api/health 200 internally: same fix (target port).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Explicit start matches Dockerfile CMD (avoids an empty/wrong command in the Railway UI).
startCommand = "python scripts/bootstrap.py"
healthcheckPath = "/api/health"
# Cold import (FastAPI + DB) can exceed 120s on small builders
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
